<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Práctica Poligráfica</title><link rel="stylesheet" href="style.css"></head><body>
<div id="start-container" class="container"><div class="start-card"><h1>Práctica Poligráfica</h1><p class="subtitle">Evaluación de integridad y conducta</p><div class="stats-preview"><div class="preview-item"><span class="number">100</span><p>Preguntas</p></div><div class="preview-item"><span class="number">5s</span><p>Por pregunta</p></div></div><button id="btnStart" class="start-btn">Iniciar Prueba</button></div></div>

<div id="quiz-container" class="hidden"><div class="top-bar"><div id="progressText"></div><div class="timer-controls"><div id="timer">5</div><button id="btnPause" class="control-btn pause-btn">Pausar</button><button id="btnFinalize" class="control-btn finalize-btn">Finalizar</button></div></div><div class="progress-container"><div id="progressBar"></div></div><div class="question-card"><h1 id="questionText"></h1></div><div class="answers"><button id="btnSi" class="answer-btn si">SÍ</button><button id="btnNo" class="answer-btn no">NO</button></div></div>

<div id="result-container" class="hidden"><div class="result-header"><h1>Resultado Final</h1></div><div class="result-content"><div class="score-display"><div class="score-circle"><span id="porcentaje"></span></div></div><div class="stats"><div class="stat correct"><span id="correctas"></span><p>Correctas</p></div><div class="stat incorrect"><span id="incorrectas"></span><p>Incorrectas</p></div><div class="stat unanswered"><span id="sinResponder"></span><p>Sin responder</p></div></div><button id="reiniciar" class="restart-btn">Intentar nuevamente</button><div class="summary-section"><h2>Resumen detallado</h2><div id="resumen"><table><thead><tr><th>#</th><th>Pregunta</th><th>Tu respuesta</th><th>Correcta</th><th>Estado</th><th>Explicación</th></tr></thead><tbody id="summaryBody"></tbody></table></div></div></div></div>

<script src="script.js"></script></body></html>
